<header class="site-header">
  <div class="header-container">
    <div class="logo-section">
      <a href="{{ .Site.BaseURL }}" class="logo">
        <img src="{{ .Site.BaseURL }}images/logo.png" alt="{{ .Site.Params.business_name }}">
      </a>
    </div>

    <nav class="main-nav" id="main-nav">
      <ul class="nav-list">
        <li><a href="{{ .Site.BaseURL }}" class="nav-link">Home</a></li>
        <li><a href="{{ .Site.BaseURL }}about" class="nav-link">About</a></li>
        <li class="nav-item-dropdown">
          <a href="{{ .Site.BaseURL }}services" class="nav-link">Services</a>
          <ul class="nav-dropdown">
            <li><a href="{{ .Site.BaseURL }}services/screens/">Screen Enclosures & Repairs</a></li>
            <li><a href="{{ .Site.BaseURL }}services/enclosures/">Aluminum Enclosures & Structures</a></li>
            <li><a href="{{ .Site.BaseURL }}services/fencing/">Fencing & Exterior</a></li>
            <li><a href="{{ .Site.BaseURL }}services/custom/">Custom Projects</a></li>
          </ul>
        </li>
        <li><a href="{{ .Site.BaseURL }}contact" class="nav-link">Contact</a></li>
      </ul>
    </nav>

    <div class="header-actions">
      <a href="tel:{{ .Site.Params.phone_link }}" class="phone-link">
        {{ .Site.Params.phone }}
      </a>
      <a href="{{ .Site.BaseURL }}contact" class="btn-primary">Get Free Estimate</a>
    </div>

    <button class="mobile-menu-toggle" id="mobile-menu-toggle">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>

<script>
document.getElementById('mobile-menu-toggle').addEventListener('click', function() {
  const nav = document.getElementById('main-nav');
  nav.classList.toggle('active');
  this.classList.toggle('active');
});

document.querySelectorAll('.nav-item-dropdown > .nav-link').forEach(link => {
  link.addEventListener('click', function(e) {
    if (window.innerWidth <= 768) {
      e.preventDefault();
      const dropdown = this.nextElementSibling;
      dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    }
  });
});
</script>
