{{ define "main" }}
<div class="service-single">
  {{ partial "breadcrumbs.html" . }}

  <!-- Service Header with Color Bar -->
  <div class="service-header category-{{ .Params.category | default "fencing" }}">
    <div class="content-container">
      <h1 class="service-title">{{ .Title }}</h1>
    </div>
  </div>

  <!-- Main Content -->
  <article class="service-content">
    <div class="content-container">
      <div class="service-body">
        {{ .Content }}
      </div>

      <!-- Related Services Sidebar -->
      {{ if .Params.related_services }}
        <aside class="service-sidebar">
          <h3>Related Services</h3>
          <ul class="related-services-list">
            {{ range .Params.related_services }}
              <li><a href="{{ .url }}">{{ .title }}</a></li>
            {{ end }}
          </ul>
        </aside>
      {{ end }}
    </div>
  </article>

  <!-- CTA Banner -->
  {{ partial "cta-banner.html" . }}
</div>
{{ end }}
